<svg xmlns="http://www.w3.org/2000/svg" width="2480" height="3508" viewBox="0 0 2480 3508">
  <rect width="2480" height="3508" fill="#ffffff"/>
  <rect x="120" y="120" width="2240" height="3268" fill="none" stroke="#111827" stroke-width="6"/>
  <text x="160" y="220" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="700" fill="#111827">FontSmith Handwriting Template</text>
  <text x="160" y="290" font-family="Arial, Helvetica, sans-serif" font-size="34" fill="#374151">Print this page, write one character inside each box using dark ink, then scan or photograph it for upload.</text>
  <text x="160" y="350" font-family="Arial, Helvetica, sans-serif" font-size="30" fill="#6b7280">Keep letters centered. Avoid touching box edges. Use bright, even lighting for photos.</text>

  <g font-family="Arial, Helvetica, sans-serif" fill="#111827">
    <text x="160" y="470" font-size="42" font-weight="700">Uppercase</text>
    <g font-size="42" font-weight="700">
      <text x="195" y="560">A</text><text x="365" y="560">B</text><text x="535" y="560">C</text><text x="705" y="560">D</text><text x="875" y="560">E</text><text x="1045" y="560">F</text><text x="1215" y="560">G</text><text x="1385" y="560">H</text><text x="1555" y="560">I</text><text x="1725" y="560">J</text><text x="1895" y="560">K</text><text x="2065" y="560">L</text>
      <text x="195" y="760">M</text><text x="365" y="760">N</text><text x="535" y="760">O</text><text x="705" y="760">P</text><text x="875" y="760">Q</text><text x="1045" y="760">R</text><text x="1215" y="760">S</text><text x="1385" y="760">T</text><text x="1555" y="760">U</text><text x="1725" y="760">V</text><text x="1895" y="760">W</text><text x="2065" y="760">X</text>
      <text x="195" y="960">Y</text><text x="365" y="960">Z</text>
    </g>

    <text x="160" y="1130" font-size="42" font-weight="700">Lowercase</text>
    <g font-size="42" font-weight="700">
      <text x="195" y="1220">a</text><text x="365" y="1220">b</text><text x="535" y="1220">c</text><text x="705" y="1220">d</text><text x="875" y="1220">e</text><text x="1045" y="1220">f</text><text x="1215" y="1220">g</text><text x="1385" y="1220">h</text><text x="1555" y="1220">i</text><text x="1725" y="1220">j</text><text x="1895" y="1220">k</text><text x="2065" y="1220">l</text>
      <text x="195" y="1420">m</text><text x="365" y="1420">n</text><text x="535" y="1420">o</text><text x="705" y="1420">p</text><text x="875" y="1420">q</text><text x="1045" y="1420">r</text><text x="1215" y="1420">s</text><text x="1385" y="1420">t</text><text x="1555" y="1420">u</text><text x="1725" y="1420">v</text><text x="1895" y="1420">w</text><text x="2065" y="1420">x</text>
      <text x="195" y="1620">y</text><text x="365" y="1620">z</text>
    </g>

    <text x="160" y="1790" font-size="42" font-weight="700">Numbers and punctuation</text>
    <g font-size="42" font-weight="700">
      <text x="195" y="1880">0</text><text x="365" y="1880">1</text><text x="535" y="1880">2</text><text x="705" y="1880">3</text><text x="875" y="1880">4</text><text x="1045" y="1880">5</text><text x="1215" y="1880">6</text><text x="1385" y="1880">7</text><text x="1555" y="1880">8</text><text x="1725" y="1880">9</text>
      <text x="195" y="2080">.</text><text x="365" y="2080">,</text><text x="535" y="2080">?</text><text x="705" y="2080">!</text><text x="875" y="2080">:</text><text x="1045" y="2080">;</text><text x="1215" y="2080">'</text><text x="1385" y="2080">"</text><text x="1555" y="2080">-</text><text x="1725" y="2080">&amp;</text>
    </g>

    <text x="160" y="2280" font-size="42" font-weight="700">Practice words</text>
    <text x="190" y="2380" font-size="36" fill="#374151">quick</text>
    <text x="650" y="2380" font-size="36" fill="#374151">brown</text>
    <text x="1110" y="2380" font-size="36" fill="#374151">jumps</text>
    <text x="1570" y="2380" font-size="36" fill="#374151">lazy</text>
  </g>

